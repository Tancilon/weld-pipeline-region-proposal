schema_version: catspec.v0
category: bellmouth
units: meter

provenance:
  source_mesh: ../datasets/obj_share_models/bellmouth/bellmouth.obj
  source_weld_mesh: ../datasets/obj_share_models/bellmouth/bellmouth_weld.obj
  size_source: ../datasets/workpiece_info.json

parts:
  - id: bellmouth_body
    primitive: bellmouth
    role: primary_structure
    frame: canonical_bbox
    size_priors:
      bbox_xyz:
        - [0.198000, 0.168000, 0.300000]
        - [0.150000, 0.087000, 0.300000]
    symmetry: mirror_profile
    prompt_tags:
      - transition_profile
      - parallel_seam_pair
      - open_line_weld

welds:
  - id: parallel_side_welds
    parts:
      - bellmouth_body
    locus:
      type: parallel_open_lines
      source: analytic_from_profile
      frame: canonical_profile
      params:
        plane_axis: y
        plane_side: min_dense
        profile_axes: [x, z]
        line_axis: x
        offset_axis: z
        offset_values: dense_internal
        path_count: 2
        sample_points_per_segment: 32
    weld_meta:
      weld_type_prior: fillet
      torch_constraints: default_single_pass
      is_load_bearing: true
      confidence: medium

schema_version: catspec.v0
category: H_beam
units: meter

provenance:
  source_mesh: ../datasets/obj_share_models/H_beam/H_beam.obj
  source_weld_mesh: ../datasets/obj_share_models/H_beam/H_beam_weld.obj
  size_source: ../datasets/workpiece_info.json

parts:
  - id: h_beam_body
    primitive: H_beam
    role: primary_structure
    frame: canonical_bbox
    size_priors:
      bbox_xyz:
        - [0.210000, 0.128000, 0.100000]
    symmetry: mirror_profile
    prompt_tags:
      - open_profile
      - h_section
      - rounded_web_flange

welds:
  - id: inner_open_profile
    parts:
      - h_beam_body
    locus:
      type: open_line_arc_line_arc_line
      source: analytic_from_profile
      frame: canonical_profile
      params:
        plane_axis: x
        plane_values: dense_internal
        profile_axes: [y, z]
        path_count: 2
        sample_points_per_segment: 32
    weld_meta:
      weld_type_prior: fillet
      torch_constraints: default_single_pass
      is_load_bearing: true
      confidence: medium
